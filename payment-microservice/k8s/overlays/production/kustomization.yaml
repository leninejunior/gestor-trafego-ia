apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

metadata:
  name: payment-microservice-production

namespace: production

resources:
- ../../
- ../../istio/

patchesStrategicMerge:
- deployment-patch.yaml
- hpa-patch.yaml

images:
- name: ghcr.io/your-org/payment-microservice
  newTag: production

commonLabels:
  environment: production

replicas:
- name: payment-microservice
  count: 5

configMapGenerator:
- name: payment-microservice-env
  behavior: merge
  literals:
  - NODE_ENV=production
  - LOG_LEVEL=warn
  - RATE_LIMIT_MAX=200