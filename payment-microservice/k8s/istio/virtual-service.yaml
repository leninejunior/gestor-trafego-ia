apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: payment-microservice
  labels:
    app: payment-microservice
spec:
  hosts:
  - payment-microservice
  - payment-api.yourdomain.com
  gateways:
  - payment-gateway
  - mesh
  http:
  - match:
    - uri:
        prefix: /health
    route:
    - destination:
        host: payment-microservice
        port:
          number: 80
    timeout: 5s
  - match:
    - uri:
        prefix: /metrics
    route:
    - destination:
        host: payment-microservice
        port:
          number: 9090
    timeout: 10s
  - match:
    - uri:
        prefix: /api/v1/payments
    route:
    - destination:
        host: payment-microservice
        port:
          number: 80
        subset: v1
      weight: 90
    - destination:
        host: payment-microservice
        port:
          number: 80
        subset: v2
      weight: 10
    fault:
      delay:
        percentage:
          value: 0.1
        fixedDelay: 5s
    retries:
      attempts: 3
      perTryTimeout: 10s
      retryOn: gateway-error,connect-failure,refused-stream
    timeout: 30s
  - match:
    - uri:
        prefix: /webhooks
    route:
    - destination:
        host: payment-microservice
        port:
          number: 80
    timeout: 15s
    headers:
      request:
        add:
          x-webhook-source: "istio-gateway"
  - route:
    - destination:
        host: payment-microservice
        port:
          number: 80
    timeout: 30s
---
apiVersion: networking.istio.io/v1beta1
kind: DestinationRule
metadata:
  name: payment-microservice
  labels:
    app: payment-microservice
spec:
  host: payment-microservice
  trafficPolicy:
    connectionPool:
      tcp:
        maxConnections: 100
        connectTimeout: 30s
        tcpKeepalive:
          time: 7200s
          interval: 75s
      http:
        http1MaxPendingRequests: 50
        http2MaxRequests: 100
        maxRequestsPerConnection: 10
        maxRetries: 3
        consecutiveGatewayErrors: 5
        interval: 30s
        baseEjectionTime: 30s
        maxEjectionPercent: 50
    loadBalancer:
      simple: LEAST_CONN
    outlierDetection:
      consecutiveGatewayErrors: 5
      consecutive5xxErrors: 5
      interval: 30s
      baseEjectionTime: 30s
      maxEjectionPercent: 50
      minHealthPercent: 50
  subsets:
  - name: v1
    labels:
      version: v1
    trafficPolicy:
      connectionPool:
        tcp:
          maxConnections: 80
  - name: v2
    labels:
      version: v2
    trafficPolicy:
      connectionPool:
        tcp:
          maxConnections: 20