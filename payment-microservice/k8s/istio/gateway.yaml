apiVersion: networking.istio.io/v1beta1
kind: Gateway
metadata:
  name: payment-gateway
  labels:
    app: payment-microservice
spec:
  selector:
    istio: ingressgateway
  servers:
  - port:
      number: 80
      name: http
      protocol: HTTP
    hosts:
    - payment-api.yourdomain.com
    tls:
      httpsRedirect: true
  - port:
      number: 443
      name: https
      protocol: HTTPS
    tls:
      mode: SIMPLE
      credentialName: payment-microservice-tls
    hosts:
    - payment-api.yourdomain.com
---
apiVersion: networking.istio.io/v1beta1
kind: Gateway
metadata:
  name: payment-gateway-staging
  labels:
    app: payment-microservice
    environment: staging
spec:
  selector:
    istio: ingressgateway
  servers:
  - port:
      number: 80
      name: http
      protocol: HTTP
    hosts:
    - payment-api-staging.yourdomain.com
    tls:
      httpsRedirect: true
  - port:
      number: 443
      name: https
      protocol: HTTPS
    tls:
      mode: SIMPLE
      credentialName: payment-microservice-staging-tls
    hosts:
    - payment-api-staging.yourdomain.com