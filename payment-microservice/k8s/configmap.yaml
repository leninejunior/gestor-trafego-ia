apiVersion: v1
kind: ConfigMap
metadata:
  name: payment-microservice-config
  labels:
    app: payment-microservice
data:
  NODE_ENV: "production"
  LOG_LEVEL: "info"
  PORT: "3000"
  METRICS_PORT: "9090"
  HEALTH_CHECK_INTERVAL: "30"
  CIRCUIT_BREAKER_THRESHOLD: "5"
  CIRCUIT_BREAKER_TIMEOUT: "60000"
  RETRY_ATTEMPTS: "3"
  RETRY_DELAY: "1000"
  CACHE_TTL: "300"
  SESSION_TIMEOUT: "3600"
  MAX_CONNECTIONS: "100"
  CONNECTION_TIMEOUT: "30000"
  WEBHOOK_TIMEOUT: "10000"
  AUDIT_RETENTION_DAYS: "90"
  ENCRYPTION_ALGORITHM: "aes-256-gcm"
  JWT_EXPIRES_IN: "1h"
  RATE_LIMIT_WINDOW: "900000"
  RATE_LIMIT_MAX: "100"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: payment-microservice-providers
  labels:
    app: payment-microservice
data:
  providers.json: |
    {
      "stripe": {
        "name": "Stripe",
        "priority": 1,
        "healthCheckUrl": "https://api.stripe.com/v1/charges",
        "timeout": 30000,
        "retryAttempts": 3
      },
      "iugu": {
        "name": "Iugu",
        "priority": 2,
        "healthCheckUrl": "https://api.iugu.com/v1/ping",
        "timeout": 30000,
        "retryAttempts": 3
      },
      "pagseguro": {
        "name": "PagSeguro",
        "priority": 3,
        "healthCheckUrl": "https://ws.pagseguro.uol.com.br/v2/sessions",
        "timeout": 30000,
        "retryAttempts": 3
      },
      "mercadopago": {
        "name": "Mercado Pago",
        "priority": 4,
        "healthCheckUrl": "https://api.mercadopago.com/v1/payment_methods",
        "timeout": 30000,
        "retryAttempts": 3
      }
    }