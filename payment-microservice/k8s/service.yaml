apiVersion: v1
kind: Service
metadata:
  name: payment-microservice
  labels:
    app: payment-microservice
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-type: nlb
    service.beta.kubernetes.io/aws-load-balancer-backend-protocol: http
spec:
  type: ClusterIP
  ports:
  - name: http
    port: 80
    targetPort: http
    protocol: TCP
  - name: metrics
    port: 9090
    targetPort: metrics
    protocol: TCP
  selector:
    app: payment-microservice
---
apiVersion: v1
kind: Service
metadata:
  name: payment-microservice-headless
  labels:
    app: payment-microservice
spec:
  type: ClusterIP
  clusterIP: None
  ports:
  - name: http
    port: 3000
    targetPort: http
    protocol: TCP
  selector:
    app: payment-microservice
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: payment-microservice
  labels:
    app: payment-microservice
automountServiceAccountToken: true
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: payment-microservice
  labels:
    app: payment-microservice
rules:
- apiGroups: [""]
  resources: ["configmaps", "secrets"]
  verbs: ["get", "list", "watch"]
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: payment-microservice
  labels:
    app: payment-microservice
subjects:
- kind: ServiceAccount
  name: payment-microservice
roleRef:
  kind: Role
  name: payment-microservice
  apiGroup: rbac.authorization.k8s.io