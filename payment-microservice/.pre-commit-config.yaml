repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.4.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ['--maxkb=1000']

  - repo: local
    hooks:
      - id: eslint
        name: ESLint
        entry: npm run lint
        language: system
        files: \.(ts|js)$
        pass_filenames: false

      - id: prettier
        name: Prettier
        entry: npm run format
        language: system
        files: \.(ts|js|json|md)$
        pass_filenames: false

      - id: type-check
        name: TypeScript Type Check
        entry: npx tsc --noEmit
        language: system
        files: \.(ts)$
        pass_filenames: false

      - id: tests
        name: Run Tests
        entry: npm test
        language: system
        files: \.(ts)$
        pass_filenames: false