services:
  app:
    container_name: flying-fox-v2-app-prod
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      PORT: 3000
    expose:
      - "3000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:3000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  proxy:
    image: nginx:1.27-alpine
    container_name: flying-fox-v2-proxy-prod
    depends_on:
      app:
        condition: service_healthy
    ports:
      - "${PROD_HTTP_PORT:-80}:80"
      - "${PROD_HTTPS_PORT:-443}:443"
    volumes:
      - ./deploy/nginx/production.http.conf:/etc/nginx/conf-templates/production.http.conf:ro
      - ./deploy/nginx/production.ssl.conf:/etc/nginx/conf-templates/production.ssl.conf:ro
      - ./scripts/nginx-entrypoint.sh:/opt/ops/nginx-entrypoint.sh:ro
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    command:
      - /bin/sh
      - /opt/ops/nginx-entrypoint.sh
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://127.0.0.1/proxy-health >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  backup:
    image: postgres:16-alpine
    container_name: flying-fox-v2-backup-prod
    env_file:
      - .env.production
    environment:
      BACKUP_DIR: /backups/postgres
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-14}
      BACKUP_INTERVAL_SECONDS: ${BACKUP_INTERVAL_SECONDS:-86400}
    volumes:
      - ./backups:/backups
      - ./scripts/postgres-backup.sh:/opt/ops/postgres-backup.sh:ro
    command:
      - /bin/sh
      - -lc
      - |
        echo "[backup] service initialized";
        while true; do
          /bin/sh /opt/ops/postgres-backup.sh;
          sleep "${BACKUP_INTERVAL_SECONDS:-86400}";
        done
    restart: unless-stopped
