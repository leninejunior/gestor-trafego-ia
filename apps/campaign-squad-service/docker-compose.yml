services:
  campaign-squad-service:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "172.17.0.1:4010:4010"
    env_file:
      - ../../.env
      - .env
    environment:
      REDIS_URL: redis://redis:6379
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: campaign-squad
      MINIO_REGION: us-east-1
      MINIO_USE_SSL: "false"
      MINIO_PUBLIC_BASE_URL: http://localhost:9000
      MINIO_BUCKET_PUBLIC_READ: "true"
    depends_on:
      - redis
      - minio

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - campaign_squad_redis_data:/data

  minio:
    image: minio/minio:RELEASE.2022-10-24T18-35-07Z
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - campaign_squad_minio_data:/data

volumes:
  campaign_squad_redis_data:
  campaign_squad_minio_data:
